version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379    # ← must be here
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - recommendation_net              # ← backend was missing this

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recommendation_net
    restart: unless-stopped

volumes:
  redis_data:

networks:
  recommendation_net:
    driver: bridge